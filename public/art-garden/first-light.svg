<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" role="img" aria-labelledby="title desc">
  <title id="title">Beheld / First Light</title>
  <desc id="desc">An original geometric study of two forms meeting in a field of light.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101625"/>
      <stop offset="0.56" stop-color="#29495a"/>
      <stop offset="1" stop-color="#f2b36d"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="58%">
      <stop offset="0" stop-color="#fff7d4" stop-opacity="0.95"/>
      <stop offset="0.34" stop-color="#f7ce8c" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#f7ce8c" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="640" height="640" fill="url(#sky)"/>
  <circle cx="320" cy="300" r="260" fill="url(#glow)" filter="url(#soft)"/>

  <path d="M76 496 C154 360 238 300 320 300 C402 300 486 360 564 496" fill="none" stroke="#f2d3a1" stroke-opacity="0.42" stroke-width="2"/>
  <path d="M112 520 C186 392 250 344 320 344 C390 344 454 392 528 520" fill="none" stroke="#f2d3a1" stroke-opacity="0.28" stroke-width="2"/>

  <circle cx="232" cy="286" r="76" fill="#142638" stroke="#f8e3b7" stroke-opacity="0.72" stroke-width="3"/>
  <circle cx="408" cy="286" r="76" fill="#d98064" fill-opacity="0.78" stroke="#fff0c8" stroke-opacity="0.72" stroke-width="3"/>
  <circle cx="320" cy="286" r="26" fill="#fff4c7"/>
  <circle cx="320" cy="286" r="7" fill="#183044"/>

  <path d="M320 104 V208 M320 364 V536 M138 286 H204 M436 286 H502" stroke="#fff4c7" stroke-opacity="0.56" stroke-width="2"/>
  <text x="320" y="585" text-anchor="middle" fill="#fff4c7" font-family="Georgia, serif" font-size="21" letter-spacing="6">BEHELD / FIRST LIGHT</text>
  <text x="320" y="614" text-anchor="middle" fill="#fff4c7" fill-opacity="0.7" font-family="Arial, sans-serif" font-size="10" letter-spacing="3">LOOK · REFLECT · RETURN</text>
</svg>
